<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>李白诗中十大典故</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC", sans-serif; background: #faf8f4; }
    nav { background: #2c1810; padding: 0 40px; display: flex; align-items: center; height: 56px; }
    nav .logo { color: #e8c97a; font-size: 18px; font-weight: bold; margin-right: 40px; }
    nav a { color: #ccc; text-decoration: none; padding: 8px 16px; border-radius: 4px; font-size: 14px; }
    nav a:hover { color: #e8c97a; background: rgba(232,201,122,0.1); }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    h1 { text-align: center; font-size: 36px; color: #2c1810; margin-bottom: 12px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 40px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .rank { display: inline-block; width: 36px; height: 36px; background: #2c1810; color: #e8c97a;
            border-radius: 50%; text-align: center; line-height: 36px; font-weight: bold; margin-bottom: 12px; }
    .allusion-name { font-size: 22px; font-weight: bold; color: #2c1810; margin-bottom: 8px; }
    .count { color: #888; font-size: 14px; margin-bottom: 16px; }
    .poems { border-top: 1px solid #eee; padding-top: 16px; }
    .poem-item { margin-bottom: 12px; padding: 12px; background: #faf8f4; border-radius: 6px; }
    .poem-title { font-weight: bold; color: #2c1810; margin-bottom: 6px; }
    .poem-content { font-size: 14px; color: #666; line-height: 1.6; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">李白全集知识库</span>
    <a href="../index.html">首页</a>
    <a href="../reader/index.html">阅读器</a>
    <a href="../search/index.html">意象检索</a>
    <a href="../map/index.html">游历地图</a>
    <a href="../graph/index.html">诗人关系</a>
    <a href="index.html" class="active">十大典故</a>
  </nav>

  <div class="container">
    <h1>李白诗中十大典故</h1>
    <div class="subtitle">基于49首乐府诗的323条王琦注释</div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    fetch('../../data/annotations/libai_allusions.json')
      .then(r => r.json())
      .then(data => {
        const counter = {};
        data.forEach(item => {
          if (!item.target || item.target.includes('未找到')) return;
          if (!counter[item.target]) counter[item.target] = [];
          counter[item.target].push(item);
        });

        const sorted = Object.entries(counter)
          .sort((a, b) => b[1].length - a[1].length)
          .slice(0, 10);

        const grid = document.getElementById('grid');
        sorted.forEach(([target, items], i) => {
          const poems = items.slice(0, 3).map(item => `
            <div class="poem-item">
              <div class="poem-title">${item.poem_title}</div>
              <div class="poem-content">${item.content.substring(0, 100)}...</div>
            </div>
          `).join('');

          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="rank">${i + 1}</div>
            <div class="allusion-name">${target}</div>
            <div class="count">出现 ${items.length} 次</div>
            <div class="poems">${poems}</div>
          `;
          grid.appendChild(card);
        });
      });
  </script>
</body>
</html>
