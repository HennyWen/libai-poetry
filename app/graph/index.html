<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>诗人关系 · 李白全集知识库</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC", "Hiragino Sans GB", sans-serif; background: #1a0f0a; display: flex; flex-direction: column; height: 100vh; color: #eee; }
    nav { background: #2c1810; padding: 0 24px; display: flex; align-items: center; height: 48px; flex-shrink: 0; }
    nav .logo { color: #e8c97a; font-size: 15px; font-weight: bold; margin-right: 32px; }
    nav a { color: #ccc; text-decoration: none; padding: 6px 12px; font-size: 13px; border-radius: 4px; }
    nav a:hover, nav a.active { color: #e8c97a; }
    .nav-toggle { display: none; background: none; border: none; color: #e8c97a; font-size: 22px; cursor: pointer; margin-left: auto; }
    #graph { flex: 1; position: relative; }
    svg { width: 100%; height: 100%; }
    .node circle { stroke: #e8c97a; stroke-width: 2; cursor: pointer; }
    .node text { fill: #eee; font-size: 14px; pointer-events: none; }
    .link { stroke: #e8c97a; stroke-opacity: 0.4; cursor: pointer; }
    .link:hover { stroke-opacity: 0.9; }
    .panel { position: absolute; right: 24px; top: 24px; background: rgba(44,24,16,0.95);
      border: 1px solid #4a2a1a; border-radius: 8px; padding: 20px; width: 280px; min-height: 80px; }
    .panel h3 { color: #e8c97a; font-size: 15px; margin-bottom: 12px; }
    .panel .poem-item { font-size: 13px; padding: 6px 0; border-bottom: 1px solid #3a2010; color: #ccc; }
    .panel .poem-item:last-child { border: none; }
    @media (max-width: 640px) {
      nav { flex-wrap: wrap; height: auto; padding: 0 16px; }
      nav .logo { padding: 12px 0; }
      .nav-toggle { display: block; padding: 12px 0; }
      .nav-links { display: none; flex-direction: column; width: 100%; padding-bottom: 8px; }
      .nav-links.open { display: flex; }
      nav a { padding: 8px 4px; font-size: 14px; }
      .panel { right: 8px; top: 8px; width: calc(100% - 16px); position: relative; margin: 8px; }
    }
  </style>
</head>
<body>
  <nav>
    <span class="logo">李白全集知识库</span>
    <button class="nav-toggle" onclick="this.nextElementSibling.classList.toggle('open')">☰</button>
    <div class="nav-links">
      <a href="../index.html">首页</a>
      <a href="../reader/index.html">阅读器</a>
      <a href="../search/index.html">意象检索</a>
      <a href="../map/index.html">游历地图</a>
      <a href="index.html" class="active">诗人关系</a>
      <a href="../allusions/index.html">十大典故</a>
    </div>
  </nav>

  <div id="graph">
    <svg id="svg"></svg>
    <div class="panel" id="panel">
      <h3>李白诗人关系图</h3>
      <p style="font-size:13px;color:#aaa">点击连线查看往来诗作</p>
    </div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    async function load() {
      const relations = await fetch('../../data/relations/libai_poet_relations.json').then(r => r.json());

      const width = document.getElementById('graph').clientWidth;
      const height = document.getElementById('graph').clientHeight;

      const nodes = [
        { id: '李白', main: true }
      ];
      relations.forEach(r => nodes.push({ id: r.poet_b, main: false, count: r.poem_count }));

      const links = relations.map(r => ({
        source: '李白',
        target: r.poet_b,
        count: r.poem_count,
        poems: r.poems
      }));

      const svg = d3.select('#svg');
      const g = svg.append('g');

      // 缩放
      svg.call(d3.zoom().on('zoom', e => g.attr('transform', e.transform)));

      const sim = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(d => 200 - d.count * 10))
        .force('charge', d3.forceManyBody().strength(-400))
        .force('center', d3.forceCenter(width / 2, height / 2));

      const link = g.append('g').selectAll('line')
        .data(links).join('line')
        .attr('class', 'link')
        .attr('stroke-width', d => 1 + d.count * 0.8)
        .on('click', (e, d) => showPoems(d));

      const node = g.append('g').selectAll('g')
        .data(nodes).join('g')
        .attr('class', 'node')
        .call(d3.drag()
          .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
          .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
        );

      node.append('circle')
        .attr('r', d => d.main ? 32 : 18 + (d.count || 1) * 2)
        .attr('fill', d => d.main ? '#c87941' : '#3a2010');

      node.append('text')
        .text(d => d.id)
        .attr('text-anchor', 'middle')
        .attr('dy', '0.35em')
        .attr('font-size', d => d.main ? 16 : 13);

      sim.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
      });
    }

    function showPoems(d) {
      const panel = document.getElementById('panel');
      const items = d.poems.map(p => `<div class="poem-item">《${p.title}》</div>`).join('');
      panel.innerHTML = `
        <h3>李白 · ${d.target.id || d.target}</h3>
        <p style="font-size:12px;color:#aaa;margin-bottom:8px">共 ${d.count} 首相关诗作</p>
        ${items}
      `;
    }

    load();
  </script>
</body>
</html>
